<div class="login-container">
  <div class="login-card">
    <h1>Iniciar sesión</h1>
    <p>Introduce tus credenciales para acceder.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Introduce tu usuario"
        />

        <small *ngIf="username?.invalid && username?.touched" class="error-text">
          El usuario es obligatorio.
        </small>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Introduce tu contraseña"
        />

        <small *ngIf="password?.invalid && password?.touched" class="error-text">
          La contraseña es obligatoria.
        </small>
      </div>

      <div *ngIf="errorMessage" class="server-error">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Iniciando sesión...' : 'Iniciar sesión' }}
      </button>
      <div class="register-link">
    <span>¿No tienes una cuenta? </span>
    <a routerLink="/preregistro">Regístrate aquí</a>
  </div>
    </form>
  </div>
</div>
