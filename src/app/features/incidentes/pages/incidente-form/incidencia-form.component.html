<p-toast></p-toast>

<div class="admin-container">
  <header class="section-header">
    <div class="title-group">
      <h1>{{ modoEditar ? 'Editar Incidencia' : 'Nueva Incidencia' }}</h1>
      <p>Registro de novedades y reportes de internos</p>
    </div>
    <button class="btn-action" routerLink="/incidentes">Volver</button>
  </header>

  <p-card>
    <form (ngSubmit)="guardar()" #formIncidencia="ngForm">
      <div class="grid-form">
        
        <!-- BUSCADOR DE REOS -->
        <div class="form-field full-width">
          <label for="reoBusqueda">Buscar Interno (Nombre o DNI)</label>
          <div class="buscador-relativo">
            <input 
              type="text" 
              pInputText 
              id="reoBusqueda"
              name="terminoBusqueda"
              [(ngModel)]="terminoBusqueda" 
              (input)="buscarReo()" 
              placeholder="Escriba para buscar..."
              class="w-full"
              required
              autocomplete="off"
            />
            
            <!-- LISTA DE SUGERENCIAS -->
            <ul class="sugerencias-lista" *ngIf="reosFiltrados.length > 0">
              <li *ngFor="let reo of reosFiltrados" (click)="seleccionarReo(reo)">
                <span class="nombre">{{ reo.nombre }} {{ reo.apellido }}</span>
                <span class="dni">DNI: {{ reo.dni }}</span>
              </li>
            </ul>
          </div>
          <small class="text-secondary" *ngIf="incidente.idReo">
            Seleccionado ID: {{ incidente.idReo }}
          </small>
        </div>

        <!-- TIPO DE INCIDENCIA -->
        <div class="form-field">
          <label for="tipo">Tipo de Incidencia</label>
          <input 
            type="text" 
            pInputText 
            id="tipo" 
            name="tipo"
            [(ngModel)]="incidente.tipo" 
            placeholder="Ej: Riña, Intento de fuga, Salud..."
            required
            class="w-full"
          />
        </div>

        <!-- FECHA Y HORA -->
        <div class="form-field">
          <label for="fechaHora">Fecha y Hora</label>
          <input 
            type="datetime-local" 
            pInputText 
            id="fechaHora" 
            name="fechaHora"
            [(ngModel)]="incidente.fechaHora" 
            required
            class="w-full"
          />
        </div>

        <!-- DESCRIPCIÓN -->
        <div class="form-field full-width">
          <label for="descripcion">Descripción de los hechos</label>
          <textarea 
            pInputTextarea 
            id="descripcion" 
            name="descripcion"
            [(ngModel)]="incidente.descripcion" 
            rows="5"
            placeholder="Detalle lo sucedido de forma clara..."
            required
            class="w-full custom-textarea"
          ></textarea>
        </div>

        <!-- DATOS INVISIBLES PERO NECESARIOS -->
        <div class="form-field info-box">
          <p><strong>Guardia responsable:</strong> ID 2 (Asignado automáticamente)</p>
        </div>

      </div>

      <footer class="form-footer">
        <button 
          type="button" 
          class="btn-secondary" 
          routerLink="/incidentes">
          Cancelar
        </button>
        <button 
          type="submit" 
          class="btn-action" 
          [disabled]="!formIncidencia.valid || !incidente.idReo">
          {{ modoEditar ? 'Actualizar Reporte' : 'Guardar Incidencia' }}
        </button>
      </footer>
    </form>
  </p-card>
</div>
