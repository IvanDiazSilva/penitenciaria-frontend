<section class="monitor-page">
  <div class="monitor-page__header">
    <div>
      <h1>Monitor</h1>
      <p>
        Consulta el estado general del centro y las visitas del día.
      </p>
    </div>

    <div class="monitor-page__actions">
      <button
        type="button"
        (click)="recargarTodo()"
        [disabled]="loadingStats || loadingVisitasHoy">
        Recargar datos
      </button>

      <button
        type="button"
        (click)="descargarPdf()"
        [disabled]="downloadingPdf">
        {{ downloadingPdf ? 'Generando PDF...' : 'Descargar informe PDF' }}
      </button>
    </div>
  </div>

  <div
    *ngIf="loadingStats || loadingVisitasHoy"
    class="monitor-page__loading">
    Cargando información del monitor...
  </div>

  <app-monitor-stats
    [stats]="stats"
    [loading]="loadingStats"
    [errorMessage]="errorStats">
  </app-monitor-stats>

  <app-monitor-visitas-hoy
    [visitasHoy]="visitasHoy"
    [loading]="loadingVisitasHoy"
    [errorMessage]="errorVisitasHoy">
  </app-monitor-visitas-hoy>
</section>
