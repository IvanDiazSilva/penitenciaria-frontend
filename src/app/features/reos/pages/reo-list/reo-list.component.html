<div class="formulario-wrapper">

  <div class="hero-formulario">
    <h1>Listado de Reos</h1>
    <p>Gestión de internos y expedientes activos.</p>
  </div>

  <p-card>

    <div class="header">
      <h2>Expedientes</h2>

      <!-- 🔥 BOTÓN MODAL -->
      <button 
        pButton 
        label="Añadir Reo" 
        icon="pi pi-plus"
        class="btn-submit"
        (click)="abrirDialogoNuevo()">
      </button>
    </div>

    <!-- 🔍 BUSCADOR -->
    <input 
      pInputText 
      placeholder="Buscar..." 
      (input)="filtrarReclusos($event)" />

    <!-- 📊 TABLA -->
    <p-table [value]="reosFiltrados" [paginator]="true" [rows]="10">

      <ng-template pTemplate="header">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>DNI</th>
          <th>Delito</th>
          <th>Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-reo>
        <tr>
          <td>{{ reo.id }}</td>
          <td>{{ reo.nombre }} {{ reo.apellido }}</td>
          <td>{{ reo.dni }}</td>
          <td>{{ reo.delito }}</td>

          <td>
            <button 
              pButton 
              icon="pi pi-trash"
              class="p-button-danger p-button-text"
              (click)="confirmarEliminar(reo)">
            </button>
          </td>
        </tr>
      </ng-template>

    </p-table>

  </p-card>

</div>

<!-- 🔥 MODAL -->
<app-reo-dialog
  [visible]="dialogVisible"
  (cerrar)="cerrarDialogo()"
  (guardado)="cargarDatos()">
</app-reo-dialog>
