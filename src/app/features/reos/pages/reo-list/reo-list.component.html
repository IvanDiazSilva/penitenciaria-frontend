<div class="formulario-wrapper">

  <div class="hero-formulario">
    <h1>Listado de Reos</h1>
    <p>Gestión de internos y expedientes activos.</p>
  </div>

  <p-card>

    <!-- HEADER -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="margin:0">Expedientes</h2>

      <!-- 🔥 BOTÓN NUEVO -->
      <button 
        pButton 
        label="Añadir Reo" 
        icon="pi pi-plus" 
        class="btn-submit"
        (click)="abrirNuevo()">
      </button>
    </div>

    <!-- 🔍 BUSCADOR -->
    <div style="margin-bottom: 25px; max-width: 400px;">
      <div class="search-box-custom" style="position: relative;">
        <i class="pi pi-search" style="position: absolute; left: 12px; top: 10px;"></i>

        <input 
          type="text"
          pInputText
          placeholder="Buscar por ID, nombre o DNI"
          style="padding-left: 35px;"
          (input)="filtrarReclusos($event)" />
      </div>
    </div>

    <!-- TABLA -->
    <p-table [value]="reosFiltrados" [rows]="10" [paginator]="true">

      <ng-template pTemplate="header">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>DNI</th>
          <th>Delito</th>
          <th style="text-align: center;">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-item>
        <tr>
          <td>#{{ item.id }}</td>
          <td>{{ item.nombre }} {{ item.apellido }}</td>
          <td>{{ item.dni }}</td>
          <td>{{ item.delito }}</td>
          <td>
            <div style="display: flex; justify-content: center; gap: 8px;">
              
              <!-- EDITAR -->
              <button 
                pButton 
                icon="pi pi-pencil"
                class="p-button-rounded p-button-text p-button-warning"
                (click)="editarReo(item)">
              </button>

              <!-- ELIMINAR -->
              <button 
                pButton 
                icon="pi pi-trash"
                class="p-button-rounded p-button-text p-button-danger"
                (click)="confirmarEliminar(item)">
              </button>

            </div>
          </td>
        </tr>
      </ng-template>

    </p-table>

  </p-card>

</div>

<!-- 🔥 DIALOG -->
<app-reo-dialog
  [visible]="dialogVisible"
  [reoId]="reoSeleccionadoId"
  (cerrar)="cerrarDialog()"
  (guardado)="onGuardado()">
</app-reo-dialog>
