<div class="card" style="padding: 20px;">
    <h2>Listado de Reos (Datos cargados: {{ reos.length }})</h2>
    <div class="card" style="padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Listado de Reos</h2>
        <button pButton pRipple label="Añadir Reo" icon="pi pi-plus" class="p-button-success" routerLink="/reos/nuevo"></button>
    </div>

    <p-table [value]="reos" [rows]="10" [paginator]="true">
        </p-table>
</div>
    <p-table [value]="reos" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template pTemplate="header">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>DNI</th>
                <th>Delito</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.nombre }}</td>
                <td>{{ item.dni }}</td>
                <td>{{ item.delito }}</td>
            </tr>
        </ng-template>
    </p-table>

    <div style="margin-top: 20px; color: gray;">
        <p>Debug de datos:</p>
        <pre>{{ reos | json }}</pre>
    </div>
</div>
