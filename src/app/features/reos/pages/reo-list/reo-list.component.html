<div class="list-container">
  <div class="list-header">
    <div>
      <h2>Listado de reos</h2>
      <p class="list-subtitle">Gestión de internos y expedientes activos.</p>
    </div>

    <div class="header-actions">
      <button
        class="btn-add"
        type="button"
        (click)="abrirNuevo()">
        <span class="icon">+</span>
        Añadir reo
      </button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input
        type="text"
        placeholder="Buscar por ID, nombre o DNI"
        (input)="filtrarReclusos($event)" />
    </div>
  </div>

  <div class="table-responsive">
    <table class="visitas-table" *ngIf="reosFiltrados.length > 0; else emptyState">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre completo</th>
          <th>DNI</th>
          <th>Delito</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let item of reosFiltrados">
          <td><strong>#{{ item.id }}</strong></td>
          <td>{{ item.nombre }} {{ item.apellido }}</td>
          <td>{{ item.dni }}</td>
          <td>{{ item.delito }}</td>
          <td class="actions actions-center">
            <button
              class="btn-action edit"
              type="button"
              title="Editar"
              (click)="editarReo(item)">
              ✏️
            </button>

            <button
              class="btn-action delete"
              type="button"
              title="Eliminar"
              (click)="confirmarEliminar(item)">
              🗑️
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <ng-template #emptyState>
      <div class="empty-state">
        <p>No se encontraron reos registrados.</p>
      </div>
    </ng-template>
  </div>
</div>

<app-reo-dialog
  [visible]="dialogVisible"
  [reoId]="reoSeleccionadoId"
  (cerrar)="cerrarDialog()"
  (guardado)="onGuardado()">
</app-reo-dialog>
