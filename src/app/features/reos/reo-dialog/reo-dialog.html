<div class="modal-backdrop" *ngIf="visible">
  <div class="modal">

    <h2>Nuevo Reo</h2>

    <div class="form-group">
      <label>Nombre</label>
      <input pInputText [(ngModel)]="reo.nombre" />
    </div>

    <div class="form-group">
      <label>Apellido</label>
      <input pInputText [(ngModel)]="reo.apellido" />
    </div>

    <div class="form-group">
      <label>DNI</label>
      <input pInputText [(ngModel)]="reo.dni" />
    </div>

    <div class="form-group">
      <label>Delito</label>
      <input pInputText [(ngModel)]="reo.delito" />
    </div>

    <div class="actions">
      <button
        pButton
        label="Cancelar"
        class="p-button-text"
        (click)="cerrarDialogo()">
      </button>

      <button
        pButton
        label="Guardar"
        class="p-button-success"
        (click)="guardar()">
      </button>
    </div>

  </div>
</div>
