<p-dialog
  [header]="isEditMode ? 'Editar Incidencia' : 'Nueva Incidencia'"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '600px' }"
  (onHide)="cerrarDialogo()">

  <div class="grid-form">
    <!-- NOMBRE -->
    <div class="campo">
      <label>Nombre y Apellidos *</label>
      <input 
        pInputText 
        [(ngModel)]="reo.nombre" 
        placeholder="Ej: Juan Pérez García" />
    </div>

    <!-- DNI -->
    <div class="campo">
      <label>DNI *</label>
      <input 
        pInputText 
        [(ngModel)]="reo.dni" 
        placeholder="12345678Z" />
    </div>

    <!-- DELITO -->
    <div class="campo campo-full">
      <label>Delito principal *</label>
      <textarea 
        [(ngModel)]="reo.delito" 
        rows="3" 
        pInputTextarea 
        placeholder="Describa el delito cometido..."></textarea>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <button 
        pButton 
        label="Cancelar" 
        icon="pi pi-times"
        class="btn-cancel"
        (click)="cerrarDialogo()">
      </button>

      <button 
        pButton 
        label="Guardar Reo" 
        icon="pi pi-check"
        class="btn-save"
        (click)="guardar()" 
        [disabled]="!reo.nombre || !reo.dni">
      </button>
    </div>
  </ng-template>
</p-dialog>
