<div class="validacion-container">
    <div class="mb-4">
    <button pButton 
            label="Volver al Monitor" 
            icon="pi pi-arrow-left" 
            class="p-button-secondary p-button-text" 
            routerLink="/monitor">
    </button>
  </div>
  <div class="header-section">
    <h1>Validación de Visitantes</h1>
    <p>Gestión de solicitudes de pre-registro para el acceso al centro.</p>
  </div>

  <div class="card">
    <p-table [value]="solicitudes" [rows]="10" [paginator]="true" responsiveLayout="scroll" styleClass="p-datatable-striped">
      <ng-template pTemplate="header">
        <tr>
          <th>Visitante</th>
          <th>DNI/NIE</th>
          <th>Interno / Parentesco</th>
          <th>Estado</th>
          <th style="text-align: center;">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-s>
        <tr>
          <td>
            <div class="font-bold">{{ s.nombreCompleto }}</div>
            <small class="text-secondary">{{ s.email }}</small>
          </td>
          <td>{{ s.dniNie }}</td>
          <td>
            <div>{{ s.nombreInterno }}</div>
            <small class="text-secondary">({{ s.parentesco }})</small>
          </td>
          <td>
            <p-tag [value]="s.estado" [severity]="getSeverity(s.estado)"></p-tag>
          </td>
          <td>
            <div class="flex-actions">
              <button pButton icon="pi pi-check" 
                      class="p-button-rounded p-button-success p-button-text" 
                      (click)="cambiarEstado(s, 'APROBADO')"
                      [disabled]="s.estado !== 'PENDIENTE'"
                      pTooltip="Aprobar solicitud"></button>
              
              <button pButton icon="pi pi-times" 
                      class="p-button-rounded p-button-danger p-button-text" 
                      (click)="cambiarEstado(s, 'RECHAZADO')"
                      [disabled]="s.estado !== 'PENDIENTE'"
                      pTooltip="Rechazar solicitud"></button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
