<p-card header="Prerregistro de visitante">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="formulario">
    <div class="campo">
      <label for="nombreCompleto">Nombre completo</label>
      <input
        id="nombreCompleto"
        type="text"
        pInputText
        formControlName="nombreCompleto"
        placeholder="Introduce tu nombre completo"
      />
      <small *ngIf="form.get('nombreCompleto')?.invalid && form.get('nombreCompleto')?.touched" class="error">
        El nombre completo es obligatorio.
      </small>
    </div>

    <div class="campo">
      <label for="dniNie">DNI / NIE</label>
      <input
        id="dniNie"
        type="text"
        pInputText
        formControlName="dniNie"
        placeholder="Introduce tu DNI o NIE"
      />
      <small *ngIf="form.get('dniNie')?.invalid && form.get('dniNie')?.touched" class="error">
        El DNI/NIE es obligatorio.
      </small>
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        pInputText
        formControlName="password"
        placeholder="Introduce una contraseña"
      />
      <small *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="error">
        La contraseña es obligatoria.
      </small>
    </div>

    <button pButton type="submit" label="Enviar prerregistro"></button>

    <p-message
      *ngIf="enviado"
      severity="success"
      text="Prerregistro enviado correctamente.">
    </p-message>

    <p-message
      *ngIf="error"
      severity="error"
      [text]="error">
    </p-message>
  </form>
</p-card>
