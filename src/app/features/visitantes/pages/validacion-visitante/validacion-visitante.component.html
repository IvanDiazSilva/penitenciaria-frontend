<p-table
  [value]="visitantes"
  [tableStyle]="{ 'min-width': '70rem' }"
  [loading]="cargando"
  responsiveLayout="scroll"
>
  <ng-template pTemplate="header">
    <tr>
      <th>ID</th>
      <th>Nombre completo</th>
      <th>DNI/NIE</th>
      <th>Email</th>
      <th>Teléfono</th>
      <th>Parentesco</th>
      <th>Estado</th>
      <th>Acciones</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-visitante>
    <tr>
      <td>{{ visitante.id }}</td>
      <td>{{ visitante.nombreCompleto }}</td>
      <td>{{ visitante.dniNie }}</td>
      <td>{{ visitante.email || '-' }}</td>
      <td>{{ visitante.telefono || '-' }}</td>
      <td>{{ visitante.parentesco || '-' }}</td>
      <td>
        <p-tag
          [value]="visitante.estado || 'SIN ESTADO'"
          [severity]="getSeverity(visitante.estado)">
        </p-tag>
      </td>
      <td class="acciones">
        <button
          pButton
          type="button"
          icon="pi pi-check"
          severity="success"
          pTooltip="Aprobar"
          (click)="aprobar(visitante)">
        </button>

        <button
          pButton
          type="button"
          icon="pi pi-times"
          severity="danger"
          pTooltip="Denegar"
          (click)="denegar(visitante)">
        </button>
      </td>
    </tr>
  </ng-template>
</p-table>
