<div class="form-container">
  <h2>Nueva Solicitud de Visita</h2>
  
  <form (ngSubmit)="guardar()" #visitaForm="ngForm">
    <div class="form-group">
      <label>ID del Interno (Reo):</label>
      <input type="number" name="reo_id" [(ngModel)]="nuevaVisita.reo.id" required class="form-control">
    </div>

    <div class="form-group">
      <label>Fecha de la Visita:</label>
      <input type="date" name="fecha_visita" [(ngModel)]="nuevaVisita.fechaVisita" required class="form-control">
    </div>

    <div class="form-group">
      <label>Nombre del Visitante (Tú):</label>
      <input type="text" [value]="nuevaVisita.visitanteNombre" disabled class="form-control disabled">
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="!visitaForm.form.valid" class="btn-save">
        Enviar Solicitud
      </button>
      <button type="button" (click)="cancelar()" class="btn-cancel">
        Cancelar
      </button>
    </div>
  </form>
</div>
