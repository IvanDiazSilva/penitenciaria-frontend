<div class="form-container">
  <h2>Nueva Solicitud de Visita</h2>
  <p class="form-subtitle">
    Completa los datos para solicitar una nueva visita.
  </p>

  <form (ngSubmit)="guardar()" #visitaForm="ngForm">
    <div class="form-group">
      <label for="solicitante">Solicitante:</label>
      <input
        type="text"
        id="solicitante"
        [value]="nombreVisitante || 'Visitante autenticado'"
        disabled
        class="form-control disabled">
      <p class="form-help">
        Tu usuario autenticado se usará para asociar la visita automáticamente.
      </p>
    </div>

    <div class="form-group">
      <label for="buscadorReo">Interno a visitar (Nombre o DNI):</label>
      
      <div class="search-container" style="position: relative;">
        <input
          type="text"
          id="buscadorReo"
          name="terminoBusqueda"
          [(ngModel)]="terminoBusqueda"
          (input)="buscarReo()"
          class="form-control"
          placeholder="Escriba para buscar..."
          autocomplete="off"
          [disabled]="cargandoReos || guardando">

        <!-- Lista de resultados sugeridos -->
        <ul *ngIf="reosFiltrados.length > 0" class="search-results-dropdown">
          <li *ngFor="let reo of reosFiltrados" (click)="seleccionarReo(reo)">
            <strong>{{ reo.nombre }}</strong> <small style="color: #64748b;">- {{ reo.dni }}</small>
          </li>
        </ul>
      </div>

      <!-- Mensaje de éxito al seleccionar -->
      <p class="form-help" *ngIf="nuevaVisita.reoId > 0" style="color: #10b981; font-weight: 500;">
        <i class="pi pi-check"></i> Seleccionado: {{ terminoBusqueda }}
      </p>

      <p class="form-help" *ngIf="cargandoReos">
        Sincronizando base de datos de internos...
      </p>
      
      <!-- Validación oculta SIN required -->
      <input type="hidden" name="reoIdValid" [(ngModel)]="nuevaVisita.reoId">
    </div>

    <div class="form-group">
      <label for="fechaVisita">Fecha de la visita:</label>
      <input
        type="date"
        id="fechaVisita"
        name="fechaVisita"
        [(ngModel)]="nuevaVisita.fechaVisita"
        required
        class="form-control"
        [disabled]="guardando">
    </div>

    <div class="form-group">
      <label for="horaEntrada">Hora de entrada:</label>
      <input
        type="time"
        id="horaEntrada"
        name="horaEntrada"
        [(ngModel)]="nuevaVisita.horaEntrada"
        class="form-control"
        [disabled]="guardando">
    </div>

    <div class="form-group">
      <label for="horaSalida">Hora de salida:</label>
      <input
        type="time"
        id="horaSalida"
        name="horaSalida"
        [(ngModel)]="nuevaVisita.horaSalida"
        class="form-control"
        [disabled]="guardando">
    </div>

    <div class="form-actions">
      <button
        type="submit"
        [disabled]="!visitaForm.form.valid || nuevaVisita.reoId <= 0 || cargandoReos || guardando"
        class="btn-save">
        {{ guardando ? 'Enviando...' : 'Enviar solicitud' }}
      </button>

      <button
        type="button"
        (click)="cancelar()"
        class="btn-cancel"
        [disabled]="guardando">
        Cancelar
      </button>
    </div>
  </form>
</div>
